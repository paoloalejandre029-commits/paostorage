<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAOSTORAGE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #121212; color: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { text-align: center; background: #1e1e1e; padding: 40px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #00adb5; letter-spacing: 2px; }
        p { color: #aaaaaa; margin-bottom: 30px; font-size: 0.95rem; }
        .upload-btn { background: #00adb5; color: white; border: none; padding: 15px 30px; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; width: 100%; box-shadow: 0 4px 15px rgba(0, 173, 181, 0.4); }
        .upload-btn:hover { background: #00e5ff; transform: translateY(-2px); }
        .upload-btn:active { transform: translateY(1px); }
        #fileInput { display: none; }
        #status { margin-top: 20px; font-size: 0.9rem; color: #00adb5; line-height: 1.4; }
        .upload-container { display: none; } /* Kept hidden so the button triggers it nicely */
    </style>
</head>
<body>

<div class="container">
    <h1>PAOSTORAGE</h1>
    <p>Secure, minimalist cloud storage for your files.</p>
    
    <div class="upload-container">
        <label for="fileInput" class="upload-label">Choose a file to upload:</label>
        <input type="file" id="fileInput" title="Choose file to upload to PaoStorage" aria-label="Choose file to upload to PaoStorage">
    </div>
    <button class="upload-btn" onclick="triggerUpload()">Upload File</button>
    
    <div id="status"></div>
</div>

<script>
    // 1. CONFIGURATION: Change these to match your Cloudinary details
    const CLOUD_NAME = 'daowmdyto'; 
    const UPLOAD_PRESET = 'paostorage_preset'; // The name you saved in your dashboard

    // Triggers the hidden file selector when the button is clicked
    function triggerUpload() {
        document.getElementById('fileInput').click();
    }

    // Handles the file upload process as soon as a file is picked
    document.getElementById('fileInput').addEventListener('change', async (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const statusDiv = document.getElementById('status');
        statusDiv.innerText = `Uploading: ${file.name}...`;

        // Pack file data using standard HTML5 FormData
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        try {
            // Send request straight to Cloudinary's public endpoint
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (response.ok) {
                // Success! Give user a clickable view link to access their file
                statusDiv.innerHTML = `✅ Successfully uploaded!<br><a href="${result.secure_url}" target="_blank" style="color: #00e5ff; text-decoration: underline; font-size: 0.95rem; font-weight: bold; display: inline-block; margin-top: 5px;">View Uploaded File</a>`;
            } else {
                // Handle Cloudinary error response messages
                statusDiv.innerText = `❌ Upload failed: ${result.error?.message || 'Unknown Cloudinary error'}`;
            }
        } catch (error) {
            statusDiv.innerText = '❌ Network error connecting to Cloudinary.';
            console.error(error);
        }
    });
</script>

</body>
</html>
