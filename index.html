<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAOSTORAGE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #121212; color: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { text-align: center; background: #1e1e1e; padding: 40px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #00adb5; letter-spacing: 2px; }
        p { color: #aaaaaa; margin-bottom: 30px; font-size: 0.95rem; }
        .upload-btn { background: #00adb5; color: white; border: none; padding: 15px 30px; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; width: 100%; box-shadow: 0 4px 15px rgba(0, 173, 181, 0.4); }
        .upload-btn:hover { background: #00e5ff; transform: translateY(-2px); }
        .upload-btn:active { transform: translateY(1px); }
        #fileInput { display: none; }
        #status { margin-top: 20px; font-size: 0.9rem; color: #00adb5; }
    </style>
</head>
<body>

<div class="container">
    <h1>PAOSTORAGE</h1>
    <p>Secure, minimalist cloud storage for your files.</p>
    
    <input type="file" id="fileInput">
    <button class="upload-btn" onclick="triggerUpload()">Upload File</button>
    
    <div id="status"></div>
</div>

<script>
    // REPLACE THIS with your actual Vercel API endpoint
    const VERCEL_BACKEND_URL = 'https://paostorage-backend-m3nm62lv5-paoloalejandre029-2647s-projects.vercel.app';

    function triggerUpload() {
        document.getElementById('fileInput').click();
    }

    document.getElementById('fileInput').addEventListener('change', async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const statusDiv = document.getElementById('status');
    statusDiv.innerText = `Uploading: ${file.name}...`;

    // Helper to read file as Base64 string
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
        const base64Data = reader.result.split(',')[1]; // Strip the data URL prefix

        const payload = {
            fileName: file.name,
            mimeType: file.type,
            fileData: base64Data
        };

        try {
            const response = await fetch(VERCEL_BACKEND_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok && result.success) {
                statusDiv.innerHTML = `✅ Successfully uploaded!<br><span style="color:#888; font-size:0.8rem;">ID: ${result.fileId}</span>`;
            } else {
                statusDiv.innerText = `❌ Upload failed: ${result.error || 'Unknown error'}`;
            }
        } catch (error) {
            statusDiv.innerText = '❌ Network error connecting to backend.';
            console.error(error);
        }
    };
});
</script>

</body>
</html>
